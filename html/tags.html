<!DOCTYPE html>
<html>
    <head>
        <title>This is a Title tag </title>
    </head>
    <body>
        <h1>first heading</h1>
        <h2>Another Headinhg</h2>
        <p>Hello Guys</p>
        <img src="assets/blahaj-spin.gif" alt="Ikea Shark" width="200">
        <!-- This is a comment block -->
        <!-- This will not be rendered by the program -->
        <!-- It serves the purpose of explaning/commenting for the programmer -->

        <!-- The next tags you will be learning are lists -->
        <!-- ul,ol,li -->

        <!-- 字旁边有黑点 = <ul> 名叫unordered list -->
        <ul>
            <li><em>basketball</em></li> <!-- em 可以Italic 文字-->
            <li><strong>volleyball</strong></li> <!--strong 可以 bold 文字 -->
            <li>badminton</li>
        </ul>
        <!-- 字旁边有 1.2.3. = <ol> 名叫ordered list -->
        <ol>
            <li>Russia</li>
            <li>Malaysia
                <ul>
                    <li>Penang</li>
                    <li>KL</li>
                    <li>Selangor</li>
                    <li>Johor</li>
                </ul>
            </li>
            <li>Japan</li>
        </ol>
    </body>
</html>
